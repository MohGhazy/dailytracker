<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login DailyTrack</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="w-full max-w-sm p-6">

    <!-- ICON + TITLE -->
    <div class="text-center mb-6">
        <h2 class="text-xl font-bold mt-4">DailyTrack</h2>
        <p class="text-gray-500 text-sm">Master your discipline</p>
    </div>

    <!-- CARD LOGIN -->
    <div class="bg-white rounded-2xl shadow p-6">

        <h3 class="font-semibold mb-4">Login</h3>

        <form method="post">
            {% csrf_token %}

            <!-- USERNAME -->
            <label class="text-sm text-gray-600">Username</label>
            <input type="text" name="username"
                   class="w-full border rounded-lg p-2 mt-1 mb-3 focus:ring-2 focus:ring-blue-500">

            <!-- PASSWORD -->
            <label class="text-sm text-gray-600">Password</label>
            <input type="password" name="password"
                   class="w-full border rounded-lg p-2 mt-1 mb-4 focus:ring-2 focus:ring-blue-500">

            <button class="w-full bg-blue-600 text-white py-2 rounded-lg shadow hover:bg-blue-700">
                Login
            </button>
        </form>

    </div>

    <!-- FOOTER -->
    <p class="text-center text-xs text-gray-400 mt-5">
        DailyTrack © {{ now|date:"Y" }}
    </p>

</div>

</body>
</html>
